<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign-in Form</title>
    <style>
        /* General Reset */
        * {
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f0f2f5; /* Light grey background */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        /* The white card container */
        .form-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        /* Label styling */
        label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        /* Input styling */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            background-color: #f9f9f9;
        }

        /* Changes background on focus */
        input:focus {
            outline: none;
            border-color: #0056b3;
            background-color: #fff;
        }

        /* Submit button styling */
        .submit-btn {
            width: 100%;
            background-color: #004aad; /* Dark blue from the image */
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #003380;
        }
    </style>
</head>
<body>

    <h1>Student Sign-in Form</h1>

    <div class="form-card">
        <form action="#" method="POST">
            <label for="first-name">First Name:</label>
            <input type="text" id="first-name" name="first-name" placeholder="e.g., John" required>

            <label for="last-name">Last Name:</label>
            <input type="text" id="last-name" name="last-name" placeholder="e.g., Smith" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="e.g., user@example.com" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <label for="student-id">Student ID:</label>
            <input type="number" id="student-id" name="student-id" min="10000" max="99999" placeholder="5-digit ID (10000-99999)" required>

            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>

</body>
</html>
